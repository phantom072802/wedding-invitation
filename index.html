<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>You Are Invited</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Playfair Display', serif;
    background: url('lavender background.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
}

.loading-screen {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;

    background: url('lavender background.jpg') no-repeat center center fixed;
    background-size: cover;

    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.5s ease;
}

.loading-screen.active {
    opacity: 1;
    visibility: visible;
}

.heart {
    position: relative;
    width: 60px;
    height: 60px;
    background: #9b59b6;
    transform: rotate(-45deg);
    animation: beat 1s infinite;
}

.heart:before,
.heart:after {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    background: #9b59b6;
    border-radius: 50%;
}

.heart:before {
    top: -30px;
    left: 0;
}

.heart:after {
    left: 30px;
    top: 0;
}

@keyframes beat {
    0% { transform: scale(1) rotate(-45deg); }
    50% { transform: scale(0.75) rotate(-45deg); }
    100% { transform: scale(1) rotate(-45deg); }
}

.fade-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f7f2f9;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.8s ease;
    z-index: 9998;
}

.fade-overlay.active {
    opacity: 1;
}

.invitation-card {
    width: 100%;
    max-width: 500px;
    padding: 60px 40px;
    text-align: center;
    border-radius: 25px;

    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(15px);

    border: 1.5px solid rgba(216, 196, 232, 0.6);

    box-shadow:
        0 8px 32px rgba(122, 92, 143, 0.25),
        inset 0 0 10px rgba(255,255,255,0.2);

    cursor: pointer;
    transition: all 0.4s ease;
}

.invitation-card:hover {
    transform: translateY(-6px);
}

.decorative-line {
    width: 100px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #d8c4e8, transparent);
    margin: 0 auto 30px;
}

.you-are-invited {
    font-family: 'Great Vibes', cursive;
    font-size: 56px;
    color: #7a5c8f;
}

.subtext {
    font-size: 16px;
    color: #5c4a6d;
}

.divider {
    width: 80%;
    height: 1px;
    background: rgba(255,255,255,0.4);
    margin: 30px auto;
}

.click-message {
    font-size: 14px;
    color: #6d5a80;
    margin-top: 30px;
}

@media (max-width: 640px) {
    .invitation-card {
        padding: 40px 25px;
    }

    .you-are-invited {
        font-size: 42px;
    }
}
</style>
</head>

<body>

<div class="loading-screen" id="loadingScreen">
    <div class="heart"></div>
</div>

<div class="fade-overlay" id="fadeOverlay"></div>

<div class="invitation-card" onclick="goToInvitation()">
    <div class="decorative-line"></div>
    <h1 class="you-are-invited">You Are Invited</h1>
    <p class="subtext">to a special celebration</p>
    <div class="divider"></div>
    <p class="click-message">Click here to continue →</p>
</div>

<script>
function goToInvitation() {
    const loading = document.getElementById('loadingScreen');
    const overlay = document.getElementById('fadeOverlay');

    loading.classList.add('active');

    setTimeout(() => {
        overlay.classList.add('active');
    }, 400);

    setTimeout(() => {
        window.location.href = 'invitation.html';
    }, 1200);
}

document.addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        goToInvitation();
    }
});
</script>

</body>
</html>
