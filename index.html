<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are Invited</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Playfair Display', serif;
            background: url('floral_lavender.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .invitation-card {
            width: 100%;
            max-width: 500px;
            background: white;
            border: 3px solid #d8c4e8;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .invitation-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 60px rgba(122, 92, 143, 0.2);
            border-color: #b39cd9;
        }

        .decorative-line {
            width: 100px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d8c4e8, transparent);
            margin: 0 auto 30px;
        }

        .you-are-invited {
            font-family: 'Great Vibes', cursive;
            font-size: 56px;
            color: #7a5c8f;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .subtext {
            font-size: 16px;
            color: #555;
            margin-bottom: 10px;
            font-style: italic;
        }

        .divider {
            width: 80%;
            height: 1px;
            background: #ddd;
            margin: 30px auto;
        }

        .click-message {
            font-size: 14px;
            color: #888;
            margin-top: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }

        .arrow {
            display: inline-block;
            margin-left: 5px;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-5px);
            }
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f7f2f9 0%, #ffffff 100%);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .loading-screen.active {
            display: flex;
            opacity: 1;
        }

        .loading-content {
            text-align: center;
        }

        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #e8d8f0;
            border-top: 4px solid #7a5c8f;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: #7a5c8f;
            letter-spacing: 2px;
        }

        /* Decorative corners */
        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
        }

        .corner-top-left {
            top: 10px;
            left: 10px;
            border-top: 2px solid #d8c4e8;
            border-left: 2px solid #d8c4e8;
        }

        .corner-top-right {
            top: 10px;
            right: 10px;
            border-top: 2px solid #d8c4e8;
            border-right: 2px solid #d8c4e8;
        }

        .corner-bottom-left {
            bottom: 10px;
            left: 10px;
            border-bottom: 2px solid #d8c4e8;
            border-left: 2px solid #d8c4e8;
        }

        .corner-bottom-right {
            bottom: 10px;
            right: 10px;
            border-bottom: 2px solid #d8c4e8;
            border-right: 2px solid #d8c4e8;
        }

        @media (max-width: 640px) {
            body {
                padding: 12px;
            }

            .invitation-card {
                padding: 40px 25px;
            }

            .you-are-invited {
                font-size: 42px;
            }

            .subtext {
                font-size: 15px;
            }

            .click-message {
                font-size: 13px;
                margin-top: 22px;
            }

            .decorative-line {
                width: 80px;
                margin-bottom: 20px;
            }

            .corner {
                width: 16px;
                height: 16px;
            }

            .loading-text {
                font-size: 20px;
            }

            .spinner {
                width: 50px;
                height: 50px;
            }
        }

        @media (max-width: 420px) {
            .invitation-card {
                padding: 30px 18px;
            }

            .you-are-invited {
                font-size: 34px;
                line-height: 1.05;
            }

            .subtext {
                font-size: 14px;
            }

            .click-message {
                font-size: 12px;
                margin-top: 18px;
            }

            .decorative-line {
                width: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-content">
            <div class="spinner"></div>
            <p class="loading-text">Loading...</p>
        </div>
    </div>

    <div class="invitation-card" onclick="goToInvitation()">
        <div class="corner corner-top-left"></div>
        <div class="corner corner-top-right"></div>
        <div class="corner corner-bottom-left"></div>
        <div class="corner corner-bottom-right"></div>

        <div class="decorative-line"></div>
        <h1 class="you-are-invited">You Are Invited</h1>
        <p class="subtext">to a special celebration</p>
        <div class="divider"></div>
        <p class="click-message">Click anywhere to continue <span class="arrow">→</span></p>
    </div>

    <script>
        function goToInvitation() {
            const loadingScreen = document.getElementById('loadingScreen');
            loadingScreen.classList.add('active');
            
            // Navigate after 2 seconds
            setTimeout(function() {
                window.location.href = 'invitation.html';
            }, 1000);
        }

        // Also allow Enter key
        document.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                goToInvitation();
            }
        });
    </script>
</body>
</html>
