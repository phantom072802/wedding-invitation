<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: url('floral_lavender.jpg') no-repeat center center fixed;
    background-size: cover;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.invitation {
    width: 360px;
    background: white;
    border: 2px solid #d8c4e8;
    border-radius: 20px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    position: relative;
}

.header {
    font-size: 18px;
    letter-spacing: 3px;
    margin-bottom: 15px;
    color: #7a5c8f;
}

.photo-frame {
    border: 6px solid #d8c4e8;
    border-radius: 50%;
    overflow: hidden;
    width: 200px;
    height: 200px;
    margin: 0 auto 15px;
}

.photo-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.names {
    font-family: 'Great Vibes', cursive;
    font-size: 36px;
    color: #7a5c8f;
    margin: 10px 0;
}

.date {
    font-size: 16px;
    margin: 10px 0;
    color: #444;
    line-height: 1.6;
}

.date strong {
    font-size: 28px;
    display: block;
}

.location {
    font-size: 14px;
    margin: 10px 0;
    color: #555;
}

.divider {
    width: 80%;
    height: 1px;
    background: #ddd;
    margin: 10px auto;
}

/* QR layout */
.footer-section {
    display: flex;
    justify-content: space-around;
    align-items: center;
    margin-top: 15px;
    gap: 10px;
}

.qr-block {
    text-align: center;
}

.footer {
    margin-bottom: 8px;
    font-size: 12px;
    color: #888;
}

/* decorative corners */
.invitation::before,
.invitation::after {
    content: "";
    position: absolute;
    width: 60px;
    height: 60px;
    border: 2px solid #e6d8f2;
    border-radius: 50%;
    opacity: 0.3;
}

.invitation::before {
    top: -20px;
    left: -20px;
}

.invitation::after {
    bottom: -20px;
    right: -20px;
}

/* Responsive */
@media (max-width: 640px) {
    body {
        height: auto;
        padding: 18px 10px;
        min-height: 100vh;
    }

    .invitation {
        width: 100%;
        max-width: 420px;
        padding: 18px;
    }

    .photo-frame {
        width: 165px;
        height: 165px;
    }

    .names {
        font-size: 30px;
    }
}

.footer-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
    gap: 10px;
}
</style>
</head>

<body>

<div class="invitation">
    <div class="header">SAVE THE DATE</div>

    <div class="photo-frame">
        <img src="8T1A7432.JPG" alt="Couple">
    </div>

    <div class="names">Clifford & Danica</div>

    <div class="date">
        APRIL
        <strong>24</strong>
        2026 • 2:00 PM
    </div>

    <div class="divider"></div>

    <div class="location">
        Nueno Ave, Imus<br>
        Cavite 4103
    </div>

    <div class="divider"></div>

    <!-- QR Codes -->
    <div class="footer-section">
        <div class="qr-block">
            <div class="footer">Church Ceremony</div>
            <div id="qrcode-church"></div>
        </div>

        <div class="qr-block">
            <div class="footer">Reception</div>
            <div id="qrcode-reception"></div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
// Church QR
const churchURL = "https://maps.app.goo.gl/zTHCgzHUVJ7V9vrU9";

// Reception QR (CHANGE THIS LINK)
const receptionURL = "https://maps.app.goo.gl/imtYe5nSNPUX8CHK9";

new QRCode(document.getElementById("qrcode-church"), {
    text: churchURL,
    width: 100,
    height: 100
});

new QRCode(document.getElementById("qrcode-reception"), {
    text: receptionURL,
    width: 100,
    height: 100
});
</script>

</body>
</html>
